<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>يا رب تقومي بالسلامة يا سلمى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Lemonada:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #ff80ab;
            --neon-pink: #f50057;
            --bg-dark: #12080e; 
            --heart-red: #ff1744;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            width: 100%;
        }

        /* أيقونات الخلفية */
        .background-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .icon {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.1;
            animation: floatUp 15s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(110vh); opacity: 0.1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .title {
            font-size: clamp(1.4rem, 6vw, 2.2rem);
            color: #ffffff;
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 20px;
            animation: fadeIn 1s forwards;
        }

        /* حاوية القلب السحرية */
        #heart-container {
            position: relative;
            /* حجم القلب ضخم في الكمبيوتر ومتناسب مع الموبايل */
            width: clamp(300px, 90vw, 600px);
            height: clamp(300px, 80vw, 550px);
            margin: 0 auto;
        }

        .dot {
            position: absolute;
            width: clamp(6px, 1.5vw, 10px);
            height: clamp(6px, 1.5vw, 10px);
            background-color: var(--primary-pink);
            border-radius: 50%;
            opacity: 0;
            filter: drop-shadow(0 0 5px var(--neon-pink));
            animation: appear 1.5s forwards;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0) translate(0, 0); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* النبض للقلب كله بعد ما يتكون */
        .pulse-animation {
            animation: heartPulse 2s infinite ease-in-out;
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            opacity: 0;
            animation: popIn 0.8s forwards 3s; /* يظهر بعد ما النقط تتجمع */
        }

        .name {
            font-family: 'Lemonada', cursive;
            font-size: clamp(2rem, 10vw, 4rem);
            color: var(--primary-pink);
            text-shadow: 0 0 20px var(--neon-pink);
        }

        .name-heart {
            font-size: clamp(1.8rem, 9vw, 3.5rem);
            color: var(--heart-red);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes heartPulse { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.05); } 
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="background-icons">
        <span class="icon" style="left: 10%; top: 20%;">👩‍⚕️</span>
        <span class="icon" style="left: 85%; top: 15%;">💖</span>
        <span class="icon" style="left: 30%; top: 60%;">🏥</span>
        <span class="icon" style="left: 70%; top: 80%;">🌸</span>
    </div>

    <div class="content">
        <h2 class="title">يا رب تقومي بالسلامة يا سلمى</h2>
        
        <div id="heart-container"></div>

        <div class="name-wrapper">
            <div class="name">سلمى</div>
            <div class="name-heart">❤️</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('heart-container');
        const numDots = 350; // عدد النقط

        function createHeart() {
            const width = container.offsetWidth;
            const height = container.offsetHeight;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // مقياس الرسم بناءً على حجم الشاشة (أكبر 3 مرات)
            const scale = width / 30; 

            for (let i = 0; i < numDots; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                const angle = (i / numDots) * Math.PI * 2;
                
                // معادلة القلب الرياضية
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));

                dot.style.left = (centerX + x * scale) + 'px';
                dot.style.top = (centerY + y * scale) + 'px';
                
                // تأخير عشوائي عشان النقط تظهر واحدة ورا التانية بشكل احترافي
                dot.style.animationDelay = (Math.random() * 2 + 0.5) + 's';
                
                container.appendChild(dot);
            }

            // تفعيل النبض بعد انتهاء التكوين
            setTimeout(() => {
                container.classList.add('pulse-animation');
            }, 3000);
        }

        window.onload = createHeart;
    </script>
</body>
</html>
